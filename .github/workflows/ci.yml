name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
      - "oss/**"

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "torch>=2.3" "numpy>=1.24" "pyyaml>=6.0"
          python -m pip install -e .

      - name: Compile package
        run: python -m compileall -q src/wgram_lm

      - name: Run smoke tests
        run: |
          python -m unittest \
            tests.test_jepa_world_model \
            tests.test_memory_scale_plan \
            tests.test_qwen_backbone_wgram
