# S043-Denoise-Recovery-Real1 (autonomous decision, no options)
# Goal: First actual implementation of denoise recovery objective.
# - Uses 208 varied synthetic bad-prefix + good-mix examples (v3_160 generator).
# - Dataset patch makes "text"(bad) + "correct_continuation" become supervised recovery:
#     model sees bad prefix in context, must output correct continuation tokens.
#   This directly targets the first recovery token + boundary steering for free-gen.
# - Phase 0 full stack active: bias (0.01) + adaptive_margin gate + first_token_margin + donor_preservation.
# - Safety: donor_correct_preservation still strong (0.55), always compare to donor_only baseline.
# - Expect: first_token_active_rate on recovery positions rises from <0.01 → 0.2+, exact_match lift on heldout.

donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 0
  core_enabled: true
  core_output_blend_enabled: false
  core_output_blend_init_bias: -8.0
  core_output_blend_min: 0.0
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 4
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_step_conditioning_enabled: true
  core_step_conditioning_max_steps: 16
  core_step_conditioning_scale: 1.0
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  core_to_text_enabled: false
  answer_bottleneck_enabled: false
  answer_bottleneck_requires_core: false
  answer_bottleneck_requires_workspace_memory: false
  core_loop_readout_enabled: false
  core_loop_readout_requires_core: true
  answer_state_loop_enabled: true
  answer_state_loop_requires_core: true
  answer_state_loop_gate_init_bias: 0.0
  answer_state_loop_gate_min: 0.0
  answer_state_loop_recurrent_block_enabled: true
  answer_state_loop_recurrent_layers: 1
  answer_state_loop_recurrent_gate_init_bias: 0.0
  answer_state_loop_recurrent_gate_min: 0.0
  answer_state_loop_mythos_update_enabled: true
  answer_state_loop_mythos_log_dt_init: -4.0
  answer_state_loop_mythos_input_injection_init: 0.02
  answer_state_loop_mythos_loop_index_enabled: true
  answer_state_loop_mythos_loop_dim: 64
  answer_state_loop_mythos_lora_rank: 0
  answer_state_loop_mythos_act_enabled: true
  answer_state_loop_mythos_act_threshold: 0.99
  answer_state_loop_halt_enabled: true
  answer_state_loop_halt_init_bias: 0.0
  answer_state_loop_halt_gate_enabled: true
  answer_state_loop_halt_gate_temperature: 1.0
  answer_state_loop_halt_gate_mode: soft
  answer_state_loop_next_token_decoder_enabled: true
  answer_state_loop_next_token_decoder_layers: 1
  answer_state_loop_next_token_decoder_gate_init_bias: 0.0
  answer_state_loop_next_token_decoder_gate_min: 0.0
  transition_state_enabled: false
  transition_state_dim: 8
  transition_state_hidden_dim: 128
  transition_state_answer_gate_init_bias: 0.0
  transition_state_answer_gate_min: 0.0
  transition_state_code_enabled: false
  transition_state_codebook_size: 5
  transition_state_code_only_answer_loop: false
  transition_state_finality_enabled: false
  transition_state_joint_enabled: true
  transition_state_joint_size: 10
  transition_state_joint_answer_bridge_enabled: true
  transition_state_joint_answer_gate_init_bias: 0.0
  transition_state_joint_answer_gate_min: 0.0
  factorized_value_state_enabled: false
  role_value_state_enabled: false
  core_role_value_state_enabled: false
  core_role_value_state_num_roles: 0
  core_role_value_state_vocab_size: 0
  answer_residual_governor_enabled: false
  qtrm_logits_scale: 0.0
  donor_logits_scale: 1.0
  qtrm_residual_clamp: null
  qtrm_residual_gate_enabled: false
  donor_residual_steering_bias_enabled: true
  donor_residual_steering_bias_init_scale: 0.012
  donor_qtrm_conflict_gate_enabled: true
  donor_qtrm_conflict_gate_mode: adaptive_margin
  donor_qtrm_conflict_qtrm_scale: 0.30
  donor_qtrm_conflict_qtrm_boost_scale: 1.05
  donor_qtrm_conflict_margin_threshold: 0.0

train:
  batch_size: 1
  seq_len: 256
  steps: 50
  lr: 7.5e-5
  loss_lm_weight: 1.0
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_canonical_causal_weight: 0.0
  canonical_causal_beta: 2.0
  canonical_causal_margin: 0.05
  canonical_causal_ablation_modes:
  - answer_next_token_decoder_off
  trainable_param_policy: all
  workspace_evidence_injection: false
  device: auto
  use_amp: true
  log_every: 8
  out_dir: runs/s043_denoise_recovery_real1
  # Phase 0 preservation (still strict, but allow steering room)
  loss_donor_correct_preservation_weight: 0.55
  loss_donor_correct_margin_weight: 0.22
  donor_correct_margin: 0.09
  # Strong first-token steering on the critical recovery tokens
  loss_first_token_margin_weight: 0.55
  # (recovery itself is now implicit via dataset supervised labels on correct_continuation)

# Notes for execution (autonomous):
# 1. python -m qtrm_mm.training.train --config configs/s043_denoise_recovery_real1.yaml \
#      --use-donor --data-jsonl data/tmp/denoise_bad_prefixes_v3_160.jsonl \
#      --init-checkpoint runs/s043_phase0_tiny_safe/last.pt
# 2. After train: run donor-only baseline + steered eval via 263-style or direct 192 on 20+ cases.
# 3. Watch for first_token_active_rate >0.15 and exact_match delta vs donor_only.
# 4. If no lift on real heldout free-gen, next autonomous step = real rollout harvesting of bad prefixes.