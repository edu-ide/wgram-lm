donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 2
  core_enabled: true
  core_output_blend_enabled: true
  core_output_blend_init_bias: -8.0
  core_output_blend_min: 0.0
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 2
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  core_to_text_enabled: true
  core_to_text_gate_init_bias: 1.5
  core_to_text_gate_min: 0.25
  answer_bottleneck_enabled: true
  answer_bottleneck_requires_core: true
  answer_bottleneck_requires_workspace_memory: false
  answer_residual_governor_enabled: true
  answer_residual_governor_init_bias: -2.0
  answer_residual_governor_min: 0.0
  qtrm_logits_scale: 0.75
  donor_logits_scale: 1.0
  qtrm_residual_clamp: 2.0
  qtrm_residual_gate_enabled: false

train:
  batch_size: 1
  seq_len: 512
  steps: 160
  lr: 1.0e-5
  loss_lm_weight: 0.20
  loss_student_lm_weight: 0.10
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_repeat_unlikelihood_weight: 0.02
  loss_preference_weight: 1.00
  preference_beta: 2.0
  preference_margin: 0.10
  loss_answer_residual_governor_weight: 0.25
  loss_canonical_causal_weight: 0.50
  canonical_causal_beta: 2.0
  canonical_causal_margin: 0.05
  canonical_causal_ablation_modes:
    - core_off
  workspace_evidence_injection: false
  donor_logits_scale_start: 1.0
  donor_logits_scale_end: 1.0
  device: auto
  use_amp: true
  log_every: 10
  out_dir: runs/qwen35_2b_4090_pure_recursive_reasoning_core_s160
