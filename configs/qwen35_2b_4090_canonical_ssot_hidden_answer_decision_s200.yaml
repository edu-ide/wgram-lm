donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 2
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 2
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  core_to_text_enabled: true
  core_to_text_gate_init_bias: 0.5
  core_to_text_gate_min: 0.0
  answer_bottleneck_enabled: false
  answer_decision_head_enabled: true
  answer_decision_feature_dim: 0
  qtrm_logits_scale: 0.30
  donor_logits_scale: 1.0
  qtrm_residual_clamp: 1.25
  qtrm_residual_gate_enabled: true
  qtrm_residual_gate_init_bias: -3.0
  qtrm_residual_gate_normalize: true
  qtrm_residual_gate_min: 0.0

train:
  batch_size: 2
  seq_len: 512
  steps: 200
  lr: 1.0e-3
  loss_lm_weight: 0.0
  loss_student_lm_weight: 0.0
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_answer_decision_weight: 1.0
  trainable_param_policy: answer_decision_head_only
  workspace_evidence_injection: true
  workspace_evidence_injection_mode: ssot
  device: auto
  use_amp: true
  log_every: 25
  out_dir: runs/qwen35_2b_4090_canonical_ssot_hidden_answer_decision_s200
