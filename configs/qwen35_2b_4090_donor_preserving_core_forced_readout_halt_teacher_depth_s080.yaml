donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 0
  core_enabled: true
  core_output_blend_enabled: false
  core_output_blend_init_bias: -8.0
  core_output_blend_min: 0.0
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 8
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_step_conditioning_enabled: true
  core_step_conditioning_max_steps: 16
  core_step_conditioning_scale: 1.0
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  core_halt_enabled: true
  core_halt_min_steps: 1
  core_halt_use_continue: true
  core_to_text_enabled: false
  answer_bottleneck_enabled: false
  core_loop_readout_enabled: true
  core_loop_readout_requires_core: true
  qtrm_logits_scale: 0.50
  donor_logits_scale: 1.0
  qtrm_residual_clamp: 1.5
  qtrm_residual_gate_enabled: false

train:
  batch_size: 1
  seq_len: 512
  steps: 80
  lr: 5.0e-5
  loss_lm_weight: 0.0
  loss_student_lm_weight: 0.0
  loss_donor_kl_weight: 0.0
  donor_kl_beta: 0.0
  donor_kl_temperature: 1.0
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_repeat_unlikelihood_weight: 0.0
  loss_greedy_token_margin_weight: 0.0
  loss_donor_correct_margin_weight: 0.0
  loss_preference_weight: 0.0
  loss_canonical_causal_weight: 0.0
  loss_core_halt_weight: 1.0
  core_halt_auto_targets: true
  core_halt_target_mode: teacher_depth
  core_halt_teacher_depth_threshold: 0.995
  core_halt_teacher_depth_logit_kl_threshold: 0.05
  core_halt_teacher_depth_min_step: 1
  trainable_param_policy: core_halt_only
  workspace_evidence_injection: false
  donor_logits_scale_start: 1.0
  donor_logits_scale_end: 1.0
  device: auto
  use_amp: true
  log_every: 10
  out_dir: /mnt/nvme0n1p2/qtrm-runs/qwen35_2b_4090_donor_preserving_core_forced_readout_halt_teacher_depth_s080
