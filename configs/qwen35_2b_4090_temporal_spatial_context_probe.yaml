donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 0
  core_enabled: true
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 4
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  temporal_spatial_context_enabled: true
  temporal_spatial_context_dim: 8
  temporal_spatial_context_max_tokens: 2
  num_actions: 10
  core_step_conditioning_enabled: true
  core_step_conditioning_max_steps: 16
  core_step_conditioning_scale: 1.0
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  answer_state_loop_enabled: true
  answer_state_loop_requires_core: true
  answer_state_loop_gate_init_bias: 0.0
  answer_state_loop_gate_min: 0.0
  qtrm_logits_scale: 1.0
  donor_logits_scale: 0.0
  qtrm_residual_clamp: null
  qtrm_residual_gate_enabled: false

train:
  batch_size: 1
  seq_len: 512
  steps: 240
  lr: 5.0e-5
  loss_lm_weight: 0.0
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  trainable_param_policy: core_and_temporal_spatial_context
  workspace_evidence_injection: false
  device: auto
  use_amp: true
  log_every: 10
  out_dir: /mnt/nvme1n1p2/qtrm-local-checkpoints/temporal_spatial_context_probe/s240
