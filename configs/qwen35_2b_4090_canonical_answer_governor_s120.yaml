donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 2
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 2
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  core_to_text_enabled: true
  core_to_text_gate_init_bias: 1.5
  core_to_text_gate_min: 0.25
  answer_bottleneck_enabled: true
  answer_bottleneck_requires_workspace_memory: false
  answer_residual_governor_enabled: true
  answer_residual_governor_init_bias: -2.0
  answer_residual_governor_min: 0.0
  qtrm_logits_scale: 0.75
  donor_logits_scale: 1.0
  qtrm_residual_clamp: 2.0
  qtrm_residual_gate_enabled: false

train:
  batch_size: 1
  seq_len: 512
  steps: 120
  lr: 3.0e-5
  loss_lm_weight: 0.40
  loss_student_lm_weight: 0.50
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_repeat_unlikelihood_weight: 0.02
  loss_greedy_token_margin_weight: 0.40
  greedy_token_margin: 0.50
  greedy_token_margin_only_donor_errors: true
  loss_answer_residual_governor_weight: 1.0
  loss_canonical_causal_weight: 0.40
  canonical_causal_beta: 2.0
  canonical_causal_margin: 0.03
  canonical_causal_ablation_modes:
    - core_off
    - workspace_off
    - core_context_off
    - core_to_text_off
  workspace_evidence_injection: true
  workspace_evidence_injection_mode: ssot
  donor_logits_scale_start: 1.0
  donor_logits_scale_end: 1.0
  device: auto
  use_amp: true
  log_every: 5
  out_dir: runs/qwen35_2b_4090_canonical_answer_governor_s120
