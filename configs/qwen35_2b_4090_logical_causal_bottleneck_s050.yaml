donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 2
  attn_every: 4
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  workspace_memory_gate_enabled: true
  workspace_memory_gate_init_bias: -2.0
  core_context_enabled: true
  core_context_gate_init_bias: -2.0
  h_cycles: 2
  l_cycles: 2
  outer_steps: 2
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  qtrm_logits_scale: 0.5
  donor_logits_scale: 1.0
  qtrm_residual_clamp: 1.0
  qtrm_residual_gate_enabled: true
  qtrm_residual_gate_init_bias: -2.0
  qtrm_residual_gate_normalize: true
  qtrm_residual_gate_min: 0.05
  evidence_bottleneck_enabled: true
  evidence_bottleneck_gate_init_bias: -2.0
  evidence_bottleneck_gate_min: 0.0
  evidence_bottleneck_suppress_without_workspace: true

train:
  batch_size: 1
  seq_len: 384
  steps: 300
  lr: 3.0e-5
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_student_lm_weight: 0.25
  loss_donor_kl_weight: 0.05
  donor_kl_beta: 1.0
  donor_kl_temperature: 1.0
  loss_repeat_unlikelihood_weight: 0.05
  loss_preference_weight: 0.05
  preference_beta: 2.0
  preference_margin: 0.5
  loss_workspace_contrastive_weight: 0.1
  workspace_contrastive_beta: 2.0
  workspace_contrastive_margin: 0.25
  loss_logical_evidence_weight: 0.1
  loss_causal_evidence_gate_weight: 0.1
  trainable_param_policy: all
  workspace_evidence_injection: true
  device: auto
  use_amp: true
  log_every: 25
  out_dir: runs/qwen35_2b_4090_logical_causal_bottleneck_s050
