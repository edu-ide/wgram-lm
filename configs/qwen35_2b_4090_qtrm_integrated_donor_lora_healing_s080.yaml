donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: true
  gradient_checkpointing: true
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 2
  core_enabled: true
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 2
  workspace_ff_mult: 2
  h_cycles: 2
  l_cycles: 2
  outer_steps: 4
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_step_conditioning_enabled: true
  core_step_conditioning_max_steps: 16
  core_step_conditioning_scale: 1.0
  core_context_enabled: true
  core_context_gate_init_bias: 0.0
  core_trm_no_grad_inner_cycles_enabled: true
  qtrm_logits_scale: 1.0
  donor_logits_scale: 0.5
  qtrm_residual_clamp: 8.0
  qtrm_residual_gate_enabled: true
  qtrm_residual_gate_init_bias: -2.0
  qtrm_residual_gate_min: 0.0

train:
  batch_size: 1
  seq_len: 512
  steps: 80
  lr: 2.0e-5
  loss_lm_weight: 1.0
  loss_student_lm_weight: 0.2
  loss_donor_lm_weight: 0.05
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_repeat_unlikelihood_weight: 0.02
  trainable_param_policy: all
  donor_logits_scale_start: 0.5
  donor_logits_scale_end: 0.0
  workspace_evidence_injection: false
  device: auto
  use_amp: true
  log_every: 10
  out_dir: runs/qwen35_2b_4090_qtrm_integrated_donor_lora_healing_s080
