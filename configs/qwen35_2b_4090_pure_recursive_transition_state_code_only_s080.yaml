donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 0
  core_enabled: true
  core_output_blend_enabled: false
  core_output_blend_init_bias: -8.0
  core_output_blend_min: 0.0
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 4
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_step_conditioning_enabled: true
  core_step_conditioning_max_steps: 16
  core_step_conditioning_scale: 1.0
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  core_to_text_enabled: false
  answer_bottleneck_enabled: false
  answer_bottleneck_requires_core: false
  answer_bottleneck_requires_workspace_memory: false
  core_loop_readout_enabled: false
  core_loop_readout_requires_core: true
  answer_state_loop_enabled: true
  answer_state_loop_requires_core: true
  answer_state_loop_gate_init_bias: 0.0
  answer_state_loop_gate_min: 0.0
  transition_state_enabled: false
  transition_state_dim: 8
  transition_state_hidden_dim: 128
  transition_state_answer_gate_init_bias: 0.0
  transition_state_answer_gate_min: 0.0
  transition_state_code_enabled: true
  transition_state_codebook_size: 256
  transition_state_code_only_answer_loop: true
  answer_residual_governor_enabled: false
  qtrm_logits_scale: 1.0
  donor_logits_scale: 0.0
  qtrm_residual_clamp: null
  qtrm_residual_gate_enabled: false

train:
  batch_size: 1
  seq_len: 512
  steps: 80
  lr: 5.0e-5
  loss_lm_weight: 0.0
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_canonical_causal_weight: 0.50
  canonical_causal_beta: 2.0
  canonical_causal_margin: 0.05
  canonical_causal_ablation_modes:
    - transition_state_off
  trainable_param_policy: core_and_answer_state_loop
  workspace_evidence_injection: false
  device: auto
  use_amp: true
  log_every: 10
  out_dir: runs/qwen35_2b_4090_pure_recursive_transition_state_code_only_s080
