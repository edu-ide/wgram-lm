donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 0
  core_enabled: true
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  h_cycles: 2
  l_cycles: 2
  outer_steps: 8
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  core_step_conditioning_enabled: true
  core_step_conditioning_max_steps: 16
  core_step_conditioning_scale: 1.0
  core_context_enabled: true
  core_context_gate_init_bias: 0.5
  answer_state_loop_enabled: true
  answer_state_loop_requires_core: true
  transition_state_joint_enabled: true
  transition_state_joint_size: 10
  core_role_value_state_enabled: true
  core_role_value_state_prompt_extract_enabled: true
  core_role_value_state_num_roles: 10
  core_role_value_state_vocab_size: 128
  primitive_transition_enabled: true
  primitive_transition_num_operations: 12
  primitive_transition_hidden_dim: 512
  primitive_transition_prompt_context_enabled: true
  primitive_transition_prompt_token_attention_enabled: true
  typed_algorithmic_value_state_enabled: true
  typed_algorithmic_value_state_recurrent_enabled: true
  typed_algorithmic_value_state_primitive_conditioning_enabled: true
  typed_algorithmic_value_state_subregisters_enabled: true
  typed_algorithmic_value_state_residual_delta_enabled: true
  typed_algorithmic_value_state_recurrent_hidden_dim: 512
  typed_algorithmic_value_state_recurrent_gate_init_bias: -1.0
  typed_algorithmic_value_state_recurrent_gate_min: 0.0
  typed_algorithmic_value_state_max_list_slots: 4
  typed_algorithmic_value_state_offset_vocab_size: 128
  typed_algorithmic_value_state_scalar_vocab_size: 128
  typed_algorithmic_value_state_kind_size: 3
  qtrm_logits_scale: 1.0
  donor_logits_scale: 0.0

train:
  batch_size: 1
  seq_len: 512
  steps: 160
  lr: 5.0e-5
  loss_lm_weight: 0.0
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_canonical_causal_weight: 0.0
  trainable_param_policy: typed_algorithmic_value_state_only
  workspace_evidence_injection: false
  device: auto
  use_amp: true
  log_every: 10
  out_dir: runs/qwen35_2b_4090_pure_recursive_transition_joint_dense_terminal_v2_typed_subregister_residual_delta_s160
