donor:
  model_id: Qwen/Qwen3.5-2B-Base
  load_in_4bit: true
  freeze_donor: true
  train_lora: false

model:
  vocab_size: 248320
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 2048
  n_prelude_layers: 2
  n_core_layers: 4
  n_coda_layers: 2
  attn_every: 4
  coda_attn_every: 1
  workspace_tokens: 64
  workspace_layers: 3
  workspace_ff_mult: 2
  workspace_include_latents_in_kv: true
  workspace_memory_gate_enabled: true
  workspace_memory_gate_init_bias: -2.0
  core_context_enabled: true
  core_context_gate_init_bias: -2.0
  core_to_text_enabled: true
  core_to_text_gate_init_bias: -2.0
  core_to_text_gate_min: 0.05
  core_world_model_enabled: true
  core_world_model_predictor_layers: 1
  core_world_model_horizon: 1
  controller_signal_enabled: true
  controller_signal_dim: 2
  controller_signal_source: learned_core
  controller_signal_base_scale: 0.0
  h_cycles: 2
  l_cycles: 2
  outer_steps: 3
  dropout: 0.0
  rope_theta: 100000.0
  delta_backend: torch_gated_delta
  attention_backend: flash_attn
  strict_backends: false
  visual_dim: 2048
  max_visual_tokens: 64
  num_actions: 10
  qtrm_logits_scale: 0.5
  donor_logits_scale: 1.0
  qtrm_residual_clamp: 0.75
  qtrm_residual_gate_enabled: true
  qtrm_residual_gate_init_bias: -2.0
  qtrm_residual_gate_normalize: true
  qtrm_residual_gate_min: 0.05

train:
  batch_size: 2
  seq_len: 384
  steps: 300
  lr: 5.0e-4
  loss_lm_weight: 0.0
  loss_jepa_weight: 0.0
  loss_aux_weight: 0.0
  loss_core_world_model_weight: 0.0
  loss_controller_signal_weight: 1.0
  loss_action_policy_weight: 1.0
  trainable_param_policy: controller_only
  workspace_evidence_injection: false
  device: auto
  use_amp: true
  log_every: 25
  out_dir: runs/qwen35_2b_4090_controller_learned_signal_s300
